<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPulse AI | Clinical Sentinel</title>
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/lucide-static@0.363.0/lib/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #064e3b, #020617 40%);
            background-color: #020617; 
            color: #f8fafc; 
            margin: 0;
            overflow: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .glass-card { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .glow-emerald { box-shadow: 0 0 20px -5px rgba(16, 185, 129, 0.4); }
        .text-glow { text-shadow: 0 0 12px rgba(16, 185, 129, 0.5); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.3); }

        .low-stock-alert {
            animation: pulse-red 2s infinite;
            border-color: rgba(239, 68, 68, 0.5) !important;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .chat-bubble-bot {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-bubble-user {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 15px -3px rgba(16, 185, 129, 0.4);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .message-content b { color: #10b981; }
        .message-content { line-height: 1.6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const PORT = 5001;
        const API_URL = `http://localhost:${PORT}/api`;

        const generatePDF = (chatHistory) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(16, 185, 129);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(24);
            doc.text("MEDPULSE AI - CLINICAL SENTINEL", 15, 25);
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(`Digital Prescription • Date: ${new Date().toLocaleString()}`, 15, 50);
            doc.text("--------------------------------------------------------------------------------------------------", 15, 55);
            
            let y = 70;
            chatHistory.forEach((msg, i) => {
                const prefix = msg.role === 'user' ? "Patient Symptom Inquiry: " : "Clinical Advisory: ";
                doc.setFont(undefined, 'bold');
                doc.text(prefix, 15, y);
                doc.setFont(undefined, 'normal');
                y += 7;
                
                const cleanText = msg.text.replace(/\*\*/g, '').replace(/###/g, '');
                const lines = doc.splitTextToSize(cleanText, 180);
                doc.text(lines, 15, y);
                y += lines.length * 7 + 10;
                
                if (y > 270) { doc.addPage(); y = 20; }
            });
            
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.text("This is an AI-generated clinical protocol for informational purposes. Mandatory physician consultation required.", 15, 285);
            
            doc.save(`MedPulse_Prescription_${Date.now()}.pdf`);
        };

        const Icon = ({ name, size = 18, className = "" }) => (
            <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('chat');
            const [medicines, setMedicines] = useState([]);

            useEffect(() => {
                fetchMedicines();
                const interval = setInterval(() => lucide.createIcons(), 500);
                return () => clearInterval(interval);
            }, []);

            const fetchMedicines = async () => {
                try {
                    const res = await axios.get(`${API_URL}/medicines`);
                    setMedicines(res.data);
                } catch (err) { console.error("Fetch Error:", err); }
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Navigation Bar */}
                    <nav className="h-20 glass flex items-center justify-between px-10 border-b border-emerald-500/10 z-50">
                        <div className="flex items-center gap-4">
                            <div className="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-slate-950 shadow-lg glow-emerald rotate-3 hover:rotate-0 transition-transform cursor-pointer">
                                <Icon name="activity" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tight text-white flex items-center gap-2">
                                    MedPulse <span className="text-emerald-400 text-glow">AI</span>
                                </h1>
                                <p className="text-[10px] text-slate-400 font-medium uppercase tracking-[0.2em]">Clinical Decision Support</p>
                            </div>
                        </div>
                        <div className="flex gap-4 bg-white/5 p-1.5 rounded-2xl border border-white/5">
                            <button 
                                onClick={() => setActiveTab('chat')} 
                                className={`px-6 py-2.5 rounded-xl transition-all duration-300 flex items-center gap-2.5 text-sm font-semibold ${activeTab === 'chat' ? 'bg-emerald-500 text-slate-950 shadow-lg glow-emerald' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                            >
                                <Icon name="message-circle" size={18} /> Chat Assistant
                            </button>
                            <button 
                                onClick={() => setActiveTab('admin')} 
                                className={`px-6 py-2.5 rounded-xl transition-all duration-300 flex items-center gap-2.5 text-sm font-semibold ${activeTab === 'admin' ? 'bg-emerald-500 text-slate-950 shadow-lg glow-emerald' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}
                            >
                                <Icon name="database" size={18} /> Inventory Portal
                            </button>
                        </div>
                    </nav>

                    {/* Main Workspace */}
                    <main className="flex-1 overflow-hidden relative">
                        {/* Background Accents */}
                        <div className="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
                        <div className="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-sky-500/10 rounded-full blur-[100px] pointer-events-none"></div>
                        
                        <div className="h-full max-w-[1400px] mx-auto p-8">
                            {activeTab === 'chat' ? <Chat medicines={medicines} /> : <Admin medicines={medicines} refresh={fetchMedicines} />}
                        </div>
                    </main>

                    <footer className="h-10 glass border-t border-white/5 flex items-center justify-center gap-6 text-[11px] font-medium text-slate-500 tracking-wide">
                        <div className="flex items-center gap-2"><span className="w-1.5 h-1.5 bg-emerald-500 rounded-full shadow-[0_0_8px_#10b981]"></span> System Active</div>
                        <div className="w-px h-3 bg-white/10"></div>
                        <div>Protocol: v6.5 Clinical Intelligence</div>
                        <div className="w-px h-3 bg-white/10"></div>
                        <div>Encrypted Pipeline</div>
                    </footer>
                </div>
            );
        };

        const Chat = ({ medicines }) => {
            const [messages, setMessages] = useState([
                { role: 'bot', text: "Welcome to the MedPulse Clinical Command Center. How can I assist you with clinical reasoning or stock inquiries today?" }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef();
            const [apiKey, setApiKey] = useState(localStorage.getItem('medpulse_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('medpulse_api_key', key);
            };

            useEffect(() => { scrollRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSend = async (text = input) => {
                if (!text.trim()) return;
                setMessages(prev => [...prev, { role: 'user', text }]);
                setInput('');
                setLoading(true);
                try {
                    const res = await axios.post(`${API_URL}/chat`, { 
                        message: text, 
                        api_key: apiKey
                    });
                    setMessages(prev => [...prev, { role: 'bot', text: res.data.text }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "⚠️ Connectivity Error: Unable to reach the clinical core sync." }]);
                } finally { setLoading(false); }
            };

            return (
                <div className="h-full flex gap-8 items-stretch max-w-6xl mx-auto">
                    {/* Chat Bubble Area */}
                    <div className="flex-1 glass rounded-[40px] flex flex-col overflow-hidden shadow-2xl border-white/5">
                        <div className="px-8 py-6 border-b border-white/5 bg-white/[0.02] flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-emerald-500/10 rounded-2xl text-emerald-400 border border-emerald-500/20"><Icon name="cpu" size={24} /></div>
                                <div>
                                    <h2 className="text-lg font-bold">Neural Assistant</h2>
                                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Clinical reasoning engaged</p>
                                </div>
                            </div>
                            <div className="flex gap-2 relative">
                                <div className="px-3 py-1 bg-white/5 rounded-full border border-white/5 text-[10px] font-bold text-slate-400 flex items-center">STOCK_AWARE</div>
                                <div onClick={() => setShowSettings(!showSettings)} className={`px-3 py-1 rounded-full border text-[10px] font-bold cursor-pointer transition-all flex items-center gap-1.5 bg-emerald-500/10 border-emerald-500/20 text-emerald-400 hover:bg-emerald-500/20`}>
                                    <Icon name="zap" size={12} className="animate-pulse" /> {apiKey ? 'Gemini Premium' : 'Neural Cloud Active'}
                                </div>
                                
                                {showSettings && (
                                    <div className="absolute top-10 right-0 w-80 glass p-6 rounded-[24px] border-emerald-500/20 shadow-2xl z-50 animate-in fade-in zoom-in-95 duration-200">
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="text-xs font-black text-white uppercase tracking-widest flex items-center gap-2"><Icon name="cpu" size={14} className="text-emerald-400" /> Neural Pipeline v10.0</h4>
                                            <button onClick={() => setShowSettings(false)} className="text-slate-500 hover:text-white"><Icon name="x" size={16} /></button>
                                        </div>
                                        <p className="text-[10px] text-slate-400 mb-4 leading-relaxed font-medium">✨ **Keyless Intelligence Active**: Your assistant is now using our decentralized Cloud Bypass. No API keys are required for basic clinical use. Add a Gemini key below only for higher speed & premium reasoning.</p>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1 mb-1 block">Google Gemini Key</label>
                                                <input 
                                                    type="password" 
                                                    value={apiKey} 
                                                    onChange={(e) => saveApiKey(e.target.value)} 
                                                    placeholder="AIzaSy..." 
                                                    className="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-2 text-xs text-sky-400 focus:border-sky-500/50 outline-none font-mono"
                                                />
                                            </div>
                                        </div>
                                        <button onClick={() => setShowSettings(false)} className="w-full mt-5 bg-emerald-500 p-2.5 rounded-xl text-xs font-black text-slate-950 uppercase tracking-widest shadow-lg glow-emerald">Save & Activate</button>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto px-8 py-6 space-y-6">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-500`}>
                                    <div className={`p-5 rounded-[28px] max-w-[80%] text-sm leading-relaxed ${m.role === 'user' ? 'chat-bubble-user text-white rounded-tr-none' : 'chat-bubble-bot text-slate-200 rounded-tl-none'}`}>
                                        <div className="whitespace-pre-wrap">{m.text}</div>
                                        {m.role === 'bot' && i === messages.length - 1 && messages.length > 1 && (
                                            <button onClick={() => generatePDF(messages)} className="mt-4 flex items-center gap-2 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-[10px] font-black uppercase tracking-widest px-4 py-2 rounded-xl transition-all border border-emerald-500/20">
                                                <Icon name="download" size={12} /> Download Clinical Prescription
                                            </button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="flex gap-2 p-4 bg-white/5 rounded-2xl w-fit animate-pulse border border-white/5 italic text-xs text-emerald-400">
                                    <Icon name="loader-2" className="animate-spin" size={14} /> Processing clinical patterns...
                                </div>
                            )}
                            <div ref={scrollRef} />
                        </div>

                        <div className="p-6 bg-white/[0.02] border-t border-white/5">
                            <div className="flex gap-4 p-2.5 bg-slate-900/50 rounded-3xl border border-white/10 group focus-within:border-emerald-500/50 transition-all duration-300 shadow-inner">
                                <input 
                                    value={input} 
                                    onChange={e => setInput(e.target.value)} 
                                    onKeyDown={e => e.key === 'Enter' && handleSend()} 
                                    className="flex-1 bg-transparent border-none outline-none px-6 text-sm placeholder:text-slate-600 focus:placeholder:text-slate-400 transition-colors" 
                                    placeholder="Ask anything – health, medications, or general questions..." 
                                />
                                <button 
                                    onClick={() => handleSend()} 
                                    className="w-12 h-12 bg-emerald-500 text-slate-950 rounded-2xl shadow-lg glow-emerald hover:scale-105 active:scale-95 transition-all flex items-center justify-center shrink-0"
                                >
                                    <Icon name="arrow-right" size={20} />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Quick Stats Panel */}
                    <div className="w-80 flex flex-col gap-6">
                        <div className="glass p-6 rounded-[32px] border-white/5 shadow-xl">
                            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6 border-b border-white/5 pb-4">Live Inventory Summary</h3>
                            <div className="space-y-6">
                                <StatItem icon="pill" label="Total Molecules" value={medicines.length} color="text-sky-400" />
                                <StatItem icon="package" label="Stock Units" value={medicines.reduce((a,c) => a + (parseInt(c.quantity) || 0), 0)} color="text-emerald-400" />
                                <StatItem icon="alert-triangle" label="Critical Alerts" value={medicines.filter(m => (parseInt(m.quantity) || 0) < 10).length} color="text-amber-400" />
                            </div>
                        </div>
                        <div className="glass p-6 rounded-[32px] border-white/5 shadow-xl flex-1 bg-emerald-500/[0.02]">
                            <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Quick Diagnostic Tips</h3>
                            <p className="text-[11px] text-slate-400 leading-relaxed mb-4 italic italic">Ask the AI for common symptoms like 'Fever', 'Headache', or 'Cold' to get instant clinical suggestions from our knowledge base.</p>
                            <div className="flex flex-wrap gap-2">
                                {['Fever', 'Acidity', 'Allergy', 'Cough'].map(t => (
                                    <span key={t} onClick={() => handleSend(t)} className="px-3 py-1.5 bg-white/5 border border-white/5 rounded-xl text-[10px] text-slate-300 hover:border-emerald-500/30 hover:bg-emerald-500/5 cursor-pointer transition-all">{t}</span>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StatItem = ({ icon, label, value, color }) => (
            <div className="flex items-center gap-4 group">
                <div className={`p-3 rounded-2xl bg-white/5 border border-white/5 ${color} transition-all group-hover:scale-110`}><Icon name={icon} size={20} /></div>
                <div><p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">{label}</p><p className="text-xl font-extrabold">{value}</p></div>
            </div>
        );

        const Admin = ({ medicines, refresh }) => {
            const [form, setForm] = useState(null);
            const [search, setSearch] = useState('');

            const handleSave = async (e) => {
                if (e) e.preventDefault();
                await axios.post(`${API_URL}/medicines`, form);
                setForm(null);
                refresh();
            };

            const adjustStock = async (m, delta) => {
                const newQty = Math.max(0, (parseInt(m.quantity) || 0) + delta);
                await axios.post(`${API_URL}/medicines`, { ...m, quantity: newQty });
                refresh();
            };

            const handleDelete = async (id) => {
                if(confirm("Confirm deletion of clinical record?")) {
                    await axios.delete(`${API_URL}/medicines/${id}`);
                    refresh();
                }
            };

            const [filter, setFilter] = useState('all');

            const filteredMeds = medicines
                .filter(m => {
                    const matchesSearch = m.name.toLowerCase().includes(search.toLowerCase()) || m.use_case?.toLowerCase().includes(search.toLowerCase());
                    const qty = parseInt(m.quantity) || 0;
                    if (filter === 'low') return matchesSearch && qty > 0 && qty < 10;
                    if (filter === 'out') return matchesSearch && qty === 0;
                    return matchesSearch;
                })
                .slice(0, 50);

            const stats = {
                total: medicines.length,
                low: medicines.filter(m => { const q = parseInt(m.quantity) || 0; return q > 0 && q < 10; }).length,
                out: medicines.filter(m => (parseInt(m.quantity) || 0) === 0).length,
                healthy: medicines.filter(m => (parseInt(m.quantity) || 0) >= 10).length
            };

            return (
                <div className="h-full flex flex-col gap-8 max-w-6xl mx-auto overflow-hidden">
                    {/* Stock Health Analytics Dashboard */}
                    <div className="grid grid-cols-4 gap-4 p-2">
                        <HealthCard label="Active Registry" value={stats.total} color="bg-sky-500" icon="database" />
                        <HealthCard label="Healthy Stock" value={stats.healthy} color="bg-emerald-500" icon="check-circle" />
                        <HealthCard label="Low Warning" value={stats.low} color="bg-amber-500" icon="alert-triangle" />
                        <HealthCard label="Critical/Out" value={stats.out} color="bg-red-500" icon="x-circle" />
                    </div>

                    <div className="flex justify-between items-center glass p-8 rounded-[40px] border-white/5 shadow-2xl relative overflow-hidden">
                        <div className="flex items-center gap-6">
                            <div className="w-14 h-14 bg-emerald-500/10 rounded-[22px] flex items-center justify-center text-emerald-400 border border-emerald-500/20"><Icon name="layers" size={32} /></div>
                            <div>
                                <h2 className="text-2xl font-black tracking-tight underline decoration-emerald-500/30 underline-offset-8 decoration-4">Clinical Registry</h2>
                                <p className="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1 text-glow">Master Command Portal v8.0</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            <div className="flex bg-white/5 p-1 rounded-xl border border-white/5">
                                {['all', 'low', 'out'].map(f => (
                                    <button 
                                        key={f} 
                                        onClick={() => setFilter(f)} 
                                        className={`px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${filter === f ? 'bg-emerald-500 text-slate-950' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>

                            <div className="relative group">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-500 transition-colors" />
                                <input 
                                    type="text" 
                                    placeholder="Deep search clinical records..." 
                                    className="bg-slate-900/50 border border-white/5 pl-11 pr-6 py-3.5 rounded-2xl outline-none focus:border-emerald-500/50 transition-all text-sm w-64 shadow-inner"
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                />
                            </div>
                            <button onClick={() => setForm({ name: '', strength: '', quantity: 0, price: 0, alternatives: '', use_case: '', dosage: '', category: '', expiry: '', manufacturer: '' })} className="bg-emerald-500 px-8 py-3.5 rounded-[22px] text-slate-950 font-black text-sm hover:scale-105 transition-all shadow-xl glow-emerald flex items-center gap-2">
                               <Icon name="plus" size={18} /> New Record
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-2 space-y-4 pb-12">
                        {form && (
                            <div className="glass p-10 rounded-[40px] border-emerald-500/20 mb-8 relative overflow-hidden animate-in zoom-in-95 duration-300">
                                <div className="absolute top-0 right-0 p-2"><button onClick={() => setForm(null)} className="p-2 text-slate-500 hover:text-white"><Icon name="x" /></button></div>
                                <h3 className="text-xl font-bold mb-8 flex items-center gap-3 text-emerald-400"><Icon name="file-plus" /> Clinical Metadata Suite v8.0</h3>
                                <form onSubmit={handleSave} className="grid grid-cols-3 gap-6">
                                    <div className="space-y-4">
                                        <InputGroup label="Medicine Name" placeholder="e.g. Paracetamol" value={form.name} onChange={v => setForm({...form, name: v})} required />
                                        <InputGroup label="Strength/Dose" placeholder="e.g. 500mg" value={form.strength} onChange={v => setForm({...form, strength: v})} />
                                        <InputGroup label="Unit Price ($)" type="number" step="0.01" value={form.price} onChange={v => setForm({...form, price: parseFloat(v)})} />
                                        <InputGroup label="Category" placeholder="e.g. Cardiac" value={form.category} onChange={v => setForm({...form, category: v})} />
                                    </div>
                                    <div className="space-y-4">
                                        <InputGroup label="Current Stock" type="number" value={form.quantity} onChange={v => setForm({...form, quantity: parseInt(v)})} />
                                        <InputGroup label="Expiry Date" type="date" value={form.expiry} onChange={v => setForm({...form, expiry: v})} />
                                        <InputGroup label="Manufacturer" placeholder="e.g. Pfizer" value={form.manufacturer} onChange={v => setForm({...form, manufacturer: v})} />
                                    </div>
                                    <div className="space-y-4">
                                        <InputGroup label="Clinical Indication" placeholder="e.g. Hypertension" value={form.use_case} onChange={v => setForm({...form, use_case: v})} />
                                        <InputGroup label="Standard Dosage" placeholder="e.g. 500mg daily" value={form.dosage} onChange={v => setForm({...form, dosage: v})} />
                                        <InputGroup label="Alternatives" placeholder="e.g. Aspirin" value={form.alternatives} onChange={v => setForm({...form, alternatives: v})} />
                                    </div>
                                    <button type="submit" className="bg-emerald-500 p-5 rounded-3xl col-span-3 font-black text-slate-950 shadow-lg glow-emerald hover:bg-emerald-400 transition-all uppercase tracking-widest mt-4">Commit to Clinical Registry</button>
                                </form>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {filteredMeds.map(m => {
                                const qty = parseInt(m.quantity) || 0;
                                const isLowStock = qty > 0 && qty < 5;
                                const outOfStock = qty === 0;
                                return (
                                    <div key={m.id} className={`glass-card p-6 rounded-[32px] flex items-center justify-between group ${isLowStock ? 'low-stock-alert' : ''}`}>
                                        <div className="flex items-center gap-6">
                                            <div className={`w-16 h-16 rounded-3xl flex items-center justify-center transition-all duration-500 ${!outOfStock ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/10' : 'bg-red-500/10 text-red-400 border-red-500/10'} border`}>
                                                <Icon name="pill" size={28} className={!outOfStock ? 'animate-float' : ''} />
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="font-extrabold text-lg text-white group-hover:text-emerald-400 transition-colors">{m.name} <span className="text-xs font-medium text-slate-500 ml-2 tracking-widest uppercase">{m.strength}</span></h3>
                                                <div className="flex flex-wrap gap-4 mt-1.5">
                                                    <div className="flex items-center gap-1.5"><Icon name="tag" size={10} className="text-slate-600" /><span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Price: ${m.price}</span></div>
                                                    <div className="flex items-center gap-1.5"><Icon name="database" size={10} className={`text-slate-600 ${isLowStock || outOfStock ? 'text-red-500' : ''}`} /><span className={`text-[10px] font-bold uppercase tracking-tighter ${!outOfStock ? (isLowStock ? 'text-amber-400' : 'text-emerald-500') : 'text-red-500 font-black'}`}>Stock: {qty} Units {isLowStock ? '(Low)' : (outOfStock ? '(Out)' : '')}</span></div>
                                                </div>
                                                <div className="flex gap-2 mt-3 overflow-x-auto pb-1">
                                                    <button onClick={(e) => { e.stopPropagation(); adjustStock(m, 50); }} className="px-2 py-1.5 rounded-lg bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-[9px] font-black border border-emerald-500/10 transition-all">+50</button>
                                                    <button onClick={(e) => { e.stopPropagation(); adjustStock(m, 10); }} className="px-2 py-1.5 rounded-lg bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-[9px] font-black border border-emerald-500/10 transition-all">+10</button>
                                                    <button onClick={(e) => { e.stopPropagation(); adjustStock(m, -5); }} className="px-2 py-1.5 rounded-lg bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-500 text-[9px] font-black border border-yellow-500/10 transition-all">-5</button>
                                                    <button onClick={(e) => { e.stopPropagation(); adjustStock(m, -50); }} className="px-2 py-1.5 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[9px] font-black border border-red-500/10 transition-all">-50</button>
                                                </div>
                                                <p className="text-[10px] text-slate-500 mt-2 line-clamp-1 italic">{m.use_case}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-3 opacity-20 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => setForm(m)} className="p-3.5 hover:bg-white/10 rounded-2xl text-emerald-400 border border-transparent hover:border-emerald-500/20"><Icon name="edit-3" size={18} /></button>
                                            <button onClick={() => handleDelete(m.id)} className="p-3.5 hover:bg-red-500/10 rounded-2xl text-red-400 border border-transparent hover:border-red-500/20"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        {medicines.length > 50 && !search && (
                            <div className="text-center p-8 text-slate-500 text-xs font-bold tracking-widest uppercase">
                                ... filtering large database. Use search for specific clinical inquiries.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const InputGroup = ({ label, placeholder, value, onChange, type = "text", ...rest }) => (
            <div className="flex flex-col gap-2">
                <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2">{label}</label>
                <input 
                    type={type} 
                    placeholder={placeholder} 
                    className="bg-slate-900 border border-white/5 p-4 rounded-2xl outline-none focus:border-emerald-500/50 transition-all text-sm shadow-inner group-focus-within:bg-slate-800" 
                    value={value || ''} 
                    onChange={e => onChange(e.target.value)} 
                    {...rest} 
                />
            </div>
        );

        const HealthCard = ({ label, value, color, icon }) => (
            <div className="glass p-5 rounded-3xl border-white/5 flex items-center gap-5 group hover:border-emerald-500/30 transition-all">
                <div className={`w-12 h-12 ${color}/20 text-white rounded-2xl flex items-center justify-center shadow-lg`}>
                    <Icon name={icon} size={24} />
                </div>
                <div>
                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{label}</p>
                    <p className="text-2xl font-black text-white">{value}</p>
                </div>
                <div className="ml-auto w-10 h-1 bg-white/5 rounded-full overflow-hidden">
                    <div className={`h-full ${color}`} style={{ width: '60%' }}></div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
